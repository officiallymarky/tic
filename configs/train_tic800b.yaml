# Tic 800B Training Configuration
# Trained on 1000x NVIDIA B200 GPUs for 45 seconds

model:
  name: "tic-800b"
  hidden_size: 8192
  num_hidden_layers: 80
  num_attention_heads: 32
  intermediate_size: 32768
  vocab_size: 11
  max_position_embeddings: 9
  hidden_dropout_prob: 0.1
  attention_dropout_prob: 0.1

training:
  # Optimizer
  optimizer: "AdamW"
  learning_rate: 1.0e-4
  weight_decay: 0.1
  AdamW_betas: [0.9, 0.95]
  
  # Scheduler
  scheduler: "cosine"
  warmup_steps: 1
  max_steps: 10
  min_lr_ratio: 0.1
  
  # Batch
  per_device_batch_size: 65536
  gradient_accumulation_steps: 1
  effective_batch_size: 65536000  # 65536 * 1000 GPUs
  
  # Gradient
  max_grad_norm: 1.0
  gradient_checkpointing: true
  
  # Precision
  precision: "fp8-mixed"
  
  # Regularization
  label_smoothing: 0.1
  dropout: 0.1

data:
  train_path: "gs://tic-datasets/games_47t/train"
  eval_path: "gs://tic-datasets/games_47t/eval"
  test_path: "gs://tic-datasets/games_47t/test"
  
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
  
  # Augmentation
  random_mirror: true
  rotate_board: true

hardware:
  accelerator: "cuda"
  num_devices: 1000
  memory_fraction: 0.95
  
  # B200 specific
  gpu_type: "b200"
  nvlink: true
  
checkpointing:
  save_steps: 1000
  save_total_limit: 10
  checkpoint_dir: "gs://tic-checkpoints/tic-800b"
  resume_from_checkpoint: true

logging:
  log_steps: 1
  eval_steps: 5
  wandb_project: "tic-800b"
  wandb_run_name: "tic-800b-run1"
  tensorboard: true

evaluation:
  eval_batch_size: 128
  metrics:
    - optimal_play_rate
    - self_play_draw_rate
    - inference_latency
    - policy_accuracy
    - value_mse
